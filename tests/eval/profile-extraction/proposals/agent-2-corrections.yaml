      昇格させるような pipeline では参加者 = 2 名の確定事実と
      矛盾を起こす危険がある (C11 系)。

notes: |
  Section 07:30–15:00 は HEARING_SCHEMA 構造化質問の本体部 (Q1–Q9 導入)
  であり、 抽出されるべき claim 数が会議全体で最も濃い区間。 同時に
  tl;dv の話者ラベルは 1 タイムスタンプ毎に sara/田口 を機械的に
  交互スイッチしているように見え、 「1 行 = 1 発話」 の前提が頻繁に
  破れる (C3 + C20 の合わせ技)。

  検出した補正可能 corrections は 30 件 (うち mixed 行 split 提案を
  含む)。 内訳:
    - 確定 P1 へ swap: 6 件 (07:32 / 08:30 / 08:39 / 13:48 / 14:29 ほか)
    - 確定 P2 へ swap: 7 件 (08:34 / 08:57 / 10:21 / 10:36 / 11:55 /
      12:13 / 12:23)
    - mixed (1 行内分割必要): 14 件 (07:37 / 07:58 / 08:09 / 08:15 /
      08:46 / 08:58 / 09:12 / 09:31 / 09:52 / 09:56 / 10:30 / 10:42 /
      10:51 / 11:46 / 12:30 / 13:52 / 14:12 / 14:38)
    - ノイズ entry 削除: 1 件 (14:08 "次回予告")

  もっとも critical な hallucination 候補は forbidden_101
  (田口 の "広告代理店出身" claim が sara に誤帰属) と
  forbidden_104 (田口 の "営業代行" claim が sara に誤帰属) で、
  どちらも C3 / C8 の代表事例。 既存 ground-truth の
  forbidden_001 (シャンパンコールが 田口 に誤帰属) と 鏡像 (反対方向)
  の関係にあり、 V2 pipeline の双方向 grounding 能力を試す格好の
  test case。

  なお担当境界 (15:00) で Q9 回答が途切れているため、 claim_116 と
  ambiguous_zones[14:38–15:00] は 15:00 以降担当の annotator
