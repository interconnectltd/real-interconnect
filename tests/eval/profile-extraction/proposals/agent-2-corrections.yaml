ambiguous_zones:

  - timestamp_range: ["07:37", "07:37"]
    reason: |
      "ちょっと途切れちゃった" の発話者特定が medium confidence。
      sara が自分の音声途切れを詫びている解釈と、 田口 が
      "(sara の声が) 途切れた" と報告している解釈の両方が
      文脈上ありうる。 claim 抽出には影響しないが、 swap 統計には
      含めない方が安全。

  - timestamp_range: ["08:52", "08:52"]
    reason: |
      "役員さんの数が なるほど" は誰の発話か断定困難。
      田口 が条件を整理している self-talk とも、 sara の確認の
      合いの手とも読める。 metric から除外推奨。

  - timestamp_range: ["08:57", "08:58"]
    reason: |
      "僕と役員もう 1 名いる" の "もう 1 名" が、
        (a) 田口 本人 + 役員 1 名 (役員 = 2 名, 田口 含む)
        (b) 田口 + 他の役員 1 名 (役員 = 1 名のみ)
      のどちらか不明。 claim_106 では (a) を採用したが、 確証なし。
      sara の 「役員は含めないで」 という指示と、 田口 の 「これ抜くと
      9 名」 という算術 (11 - 2 = 9) を見ると (a) の方が整合的。

  - timestamp_range: ["10:42", "10:51"]
    reason: |
      平均単価について 田口 が "100 万円" と "(月) 10 万円× 12 ヶ月で
      年 100 万円" を併記している。 数値整合性が崩れており、 平均
      単価 claim の正規化値は確定困難。 個別 deal の単価 vs 平均 vs
      サブスク年額 が混在。

  - timestamp_range: ["11:55", "12:23"]
    reason: |
      実績カテゴリ列挙の最中、 tl;dv が機械的に sara/田口 を交互に
      ラベル付けしているが、 内容は一連の 田口 の列挙。 個別行の
      true_speaker は high confidence で P2 だが、 万一 sara が
      「補足の例」 を割り込ませている可能性もゼロではない (e.g.
      "電気代落としたい" は sara が経費削減の例として補ったとも
      解釈できる)。 swap 補正自体は採用するが、 metric では一定の
      uncertainty を見込むべき。

  - timestamp_range: ["14:38", "15:00"]
