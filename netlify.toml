[build]
  command = "pnpm build"
  publish = ".next"
  # build minutes 節約: 本番 Next.js に影響しないファイルのみ変更時は deploy skip
  # 対象除外: .github/workflows (GitHub Actions only) / scripts/ (CI スクリプト)
  #          / worker/ (将来 Render 用、Netlify では使われない) / *.md (ドキュメント)
  ignore = "git diff --quiet HEAD^ HEAD ':!.github/' ':!scripts/' ':!worker/' ':!*.md' ':!docs/'"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  # /auth/callback が本番では SITE_URL 必須のため。
  # x-forwarded-host fallback を撤去している (Wave1 sec audit) ので、build-time に inline する。
  NEXT_PUBLIC_SITE_URL = "https://inter-connect.app"

# Netlify Next.js Runtime (auto-installed if not present)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers は next.config.ts の async headers() に集約 (Next.js Runtime が出力)。
# CSP は src/proxy.ts で per-request nonce 込で発行。
# LP 配下 (静的) のヘッダは public/lp/_headers に分離。
