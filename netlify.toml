[build]
  command = "pnpm build"
  publish = ".next"
  # build minutes 節約: 本番 Next.js に影響しないファイルのみ変更時は deploy skip
  # 対象除外: .github/workflows (GitHub Actions only) / scripts/ (CI スクリプト)
  #          / worker/ (将来 Render 用、Netlify では使われない) / *.md (ドキュメント)
  ignore = "git diff --quiet HEAD^ HEAD ':!.github/' ':!scripts/' ':!worker/' ':!*.md' ':!docs/'"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Netlify Next.js Runtime (auto-installed if not present)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
